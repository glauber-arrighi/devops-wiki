services:

  # ─── Aplicação Laravel ───────────────────────────────────────────
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: devops-wiki-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/app.ini
    environment:
      - APP_ENV=${APP_ENV:-local}
    networks:
      - devops-wiki
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Nginx ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: devops-wiki-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - devops-wiki
    depends_on:
      - app

  # ─── MySQL ───────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: devops-wiki-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-devops_wiki}
      MYSQL_USER: ${DB_USERNAME:-wiki}
      MYSQL_PASSWORD: ${DB_PASSWORD:-wiki_secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "${DB_PORT_EXTERNAL:-33060}:3306"
    networks:
      - devops-wiki
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: devops-wiki-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT_EXTERNAL:-63790}:6379"
    networks:
      - devops-wiki
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Queue Worker ─────────────────────────────────────────────────
  queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: devops-wiki-queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www
    networks:
      - devops-wiki
    depends_on:
      - app
      - redis

  # ─── Scheduler ────────────────────────────────────────────────────
  scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: devops-wiki-scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www
    networks:
      - devops-wiki
    depends_on:
      - app

networks:
  devops-wiki:
    driver: bridge

volumes:
  db_data:
  redis_data:
